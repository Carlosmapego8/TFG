version: 2

models:

  # ========================
  # DIMENSIONS
  # ========================

  - name: dim_teams
    description: "Dimensión de equipos participantes en los torneos."
    columns:
      - name: team_id
        description: "Clave surrogate única del equipo."
        tests:
          - unique
          - not_null

      - name: team_name
        description: "Nombre del equipo (nombre canónico normalizado)."
        tests:
          - not_null

      - name: team_code
        description: "Código de 3 letras del equipo (ISO o similar)."
        tests:
          - not_null
          - unique


  - name: dim_groups
    description: "Dimensión de grupos (A, B, C...) independiente del torneo."
    columns:
      - name: group_id
        description: "Clave surrogate única del grupo."
        tests:
          - unique
          - not_null

      - name: group_name
        description: "Nombre del grupo."
        tests:
          - not_null


  - name: dim_tournaments
    description: "Dimensión de torneos con su año correspondiente."
    columns:
      - name: tournament_id
        description: "Clave surrogate única del torneo."
        tests:
          - unique
          - not_null

      - name: tournament_name
        description: "Nombre del torneo (ej. Euro Cup)."
        tests:
          - not_null

      - name: year
        description: "Año del torneo."
        tests:
          - not_null


  - name: dim_stadiums
    description: "Dimensión de estadios donde se juegan los partidos."
    columns:
      - name: stadium_id
        description: "Clave surrogate única del estadio."
        tests:
          - unique
          - not_null

      - name: stadium_name
        description: "Nombre del estadio."
        tests:
          - not_null
          - unique


  - name: dim_date
    description: "Dimensión de fechas derivada de la fecha de los partidos."
    columns:
      - name: date_id
        description: "Clave de la fecha (DATE)."
        tests:
          - unique
          - not_null

      - name: full_date
        description: "Fecha completa (YYYY-MM-DD)."
        tests:
          - not_null
          - unique

      - name: year
        description: "Año de la fecha."
        tests:
          - not_null

      - name: month
        description: "Mes de la fecha (1-12)."
        tests:
          - not_null

      - name: day
        description: "Día del mes."
        tests:
          - not_null

      - name: weekday
        description: "Día de la semana en formato texto."
        tests:
          - not_null


  # ========================
  # FACT TABLE
  # ========================

  - name: fct_matches
    description: "Tabla de hechos que contiene la información de cada partido con métricas y claves a dimensiones."
    columns:
      - name: match_id
        description: "Clave surrogate única del partido."
        tests:
          - unique
          - not_null

      - name: tournament_id
        description: "FK hacia dim_tournaments."
        tests:
          - not_null
          - relationships:
              to: ref('dim_tournaments')
              field: tournament_id

      - name: group_id
        description: "FK hacia dim_groups (NULL en partidos eliminatorios)."
        tests:
          - relationships:
              to: ref('dim_groups')
              field: group_id
              config:
                severity: warn

      - name: stadium_id
        description: "FK hacia dim_stadiums."
        tests:
          - not_null
          - relationships:
              to: ref('dim_stadiums')
              field: stadium_id

      - name: home_team_id
        description: "FK hacia dim_teams (equipo local)."
        tests:
          - not_null
          - relationships:
              to: ref('dim_teams')
              field: team_id

      - name: away_team_id
        description: "FK hacia dim_teams (equipo visitante)."
        tests:
          - not_null
          - relationships:
              to: ref('dim_teams')
              field: team_id

      - name: date_id
        description: "FK hacia dim_date."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id

      - name: match_number
        description: "Número identificador del partido dentro del torneo."
        tests:
          - not_null

      - name: round_number
        description: "Número de ronda del partido."
        tests:
          - not_null

      - name: match_hour
        description: "Hora de inicio del partido."
        tests:
          - not_null

      - name: home_goals
        description: "Goles anotados por el equipo local."
        tests:
          - not_null

      - name: away_goals
        description: "Goles anotados por el equipo visitante."
        tests:
          - not_null

      - name: total_goals
        description: "Total de goles en el partido (home_goals + away_goals)."
        tests:
          - not_null

      - name: result
        description: "Resultado del partido: home_win, away_win o draw."
        tests:
          - not_null
          - accepted_values:
              values: ['home_win', 'away_win', 'draw']


  # ========================
  # KPIs
  # ========================

  - name: kpi_team_stats
    description: "Estadísticas agregadas por equipo (local + visitante combinadas)."
    columns:
      - name: team_id
        description: "FK hacia dim_teams."
        tests:
          - unique
          - not_null
      - name: team_name
        description: "Nombre del equipo."
      - name: team_code
        description: "Código de 3 letras del equipo."
      - name: matches_played
        description: "Partidos jugados en total."
      - name: wins
        description: "Victorias totales."
      - name: draws
        description: "Empates totales."
      - name: losses
        description: "Derrotas totales."
      - name: goals_for
        description: "Goles a favor."
      - name: goals_against
        description: "Goles en contra."
      - name: goal_difference
        description: "Diferencia de goles (goals_for - goals_against)."
      - name: points
        description: "Puntos totales (3 por victoria, 1 por empate)."
      - name: avg_goals_per_match
        description: "Media de goles a favor por partido."

  - name: kpi_tournament_summary
    description: "Resumen estadístico global del torneo."
    columns:
      - name: tournament_id
        description: "FK hacia dim_tournaments."
        tests:
          - unique
          - not_null
      - name: total_matches
        description: "Total de partidos jugados."
      - name: total_goals
        description: "Total de goles marcados."
      - name: avg_goals_per_match
        description: "Media de goles por partido."
      - name: max_goals_in_match
        description: "Máximo de goles en un solo partido."
      - name: total_home_wins
        description: "Victorias como local."
      - name: total_away_wins
        description: "Victorias como visitante."
      - name: total_draws
        description: "Empates totales."
      - name: home_win_pct
        description: "Porcentaje de victorias locales."
      - name: away_win_pct
        description: "Porcentaje de victorias visitantes."
      - name: draw_pct
        description: "Porcentaje de empates."

  - name: kpi_stadium_stats
    description: "Estadísticas por estadio."
    columns:
      - name: stadium_id
        description: "FK hacia dim_stadiums."
        tests:
          - unique
          - not_null
      - name: stadium_name
        description: "Nombre del estadio."
      - name: matches_hosted
        description: "Partidos celebrados."
      - name: total_goals
        description: "Total de goles en el estadio."
      - name: avg_goals_per_match
        description: "Media de goles por partido en el estadio."
      - name: home_wins
        description: "Victorias locales."
      - name: away_wins
        description: "Victorias visitantes."
      - name: draws
        description: "Empates."

  - name: kpi_group_standings
    description: "Clasificación de la fase de grupos."
    columns:
      - name: group_name
        description: "Nombre del grupo (A, B, C...)."
        tests:
          - not_null
      - name: team_name
        description: "Nombre del equipo."
      - name: team_code
        description: "Código de 3 letras del equipo."
      - name: matches_played
        description: "Partidos jugados en fase de grupos."
      - name: wins
        description: "Victorias."
      - name: draws
        description: "Empates."
      - name: losses
        description: "Derrotas."
      - name: goals_for
        description: "Goles a favor."
      - name: goals_against
        description: "Goles en contra."
      - name: goal_difference
        description: "Diferencia de goles."
      - name: points
        description: "Puntos (3V + 1E)."
