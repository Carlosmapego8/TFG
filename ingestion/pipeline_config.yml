database:
  type: postgres
  config_file: "db_config.py"

ingestions:
  - type: csv_external
    path: "data/population.csv"
    schema_name: "raw"
    table_name: "population"

  - type: postgres_external
    source_schema: "staging"
    source_table: "euro_matches"
    schema_name: "raw"
    table_name: "euro_matches_raw"
    source_db_config: "db_origin_config.py"

  - type: mongo
    mongo_database: "eurocup"
    mongo_collection: "eurocup"
    schema_name: "raw"
    table_name: "eurocup"
    source_db_config: "mongo_config.py"

transformations:
  - type: dbt
    project_dir: "../transformation/tfg_dbt_project"
    command: build

# Analytics component - generates Power BI PBIP project
analytics:
  db_config_path: "db_config.py"
  output_dir: "analysis"
  project_name: "euro_analysis"
